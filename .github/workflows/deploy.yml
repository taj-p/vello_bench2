name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: wasm-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: wasm-cargo-

      - name: Cache wasm-bindgen-cli
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/wasm-bindgen
          key: wasm-bindgen-${{ hashFiles('Cargo.lock') }}
          restore-keys: wasm-bindgen-

      - name: Install wasm-bindgen-cli
        run: |
          if ! command -v wasm-bindgen &> /dev/null; then
            cargo install wasm-bindgen-cli --version 0.2.114
          fi

      # Hybrid + SIMD
      - name: Build hybrid+simd
        run: cargo build --target wasm32-unknown-unknown --release --no-default-features --features hybrid
        env:
          RUSTFLAGS: -Ctarget-feature=+simd128

      - name: Bindgen hybrid+simd
        run: |
          wasm-bindgen --target web --out-dir dist/hybrid-simd --no-typescript \
            target/wasm32-unknown-unknown/release/vello_bench2.wasm

      # Hybrid + no-SIMD
      - name: Build hybrid+nosimd
        run: cargo build --target wasm32-unknown-unknown --release --no-default-features --features hybrid
        env:
          RUSTFLAGS: ""

      - name: Bindgen hybrid+nosimd
        run: |
          wasm-bindgen --target web --out-dir dist/hybrid-nosimd --no-typescript \
            target/wasm32-unknown-unknown/release/vello_bench2.wasm

      # CPU + SIMD
      - name: Build cpu+simd
        run: cargo build --target wasm32-unknown-unknown --release --no-default-features --features cpu
        env:
          RUSTFLAGS: -Ctarget-feature=+simd128

      - name: Bindgen cpu+simd
        run: |
          wasm-bindgen --target web --out-dir dist/cpu-simd --no-typescript \
            target/wasm32-unknown-unknown/release/vello_bench2.wasm

      # CPU + no-SIMD
      - name: Build cpu+nosimd
        run: cargo build --target wasm32-unknown-unknown --release --no-default-features --features cpu
        env:
          RUSTFLAGS: ""

      - name: Bindgen cpu+nosimd
        run: |
          wasm-bindgen --target web --out-dir dist/cpu-nosimd --no-typescript \
            target/wasm32-unknown-unknown/release/vello_bench2.wasm

      # Pathfinder + SIMD
      - name: Build pathfinder+simd
        run: cargo build --target wasm32-unknown-unknown --release --no-default-features --features pathfinder
        env:
          RUSTFLAGS: -Ctarget-feature=+simd128

      - name: Bindgen pathfinder+simd
        run: |
          wasm-bindgen --target web --out-dir dist/pathfinder-simd --no-typescript \
            target/wasm32-unknown-unknown/release/vello_bench2.wasm

      # Pathfinder + no-SIMD
      - name: Build pathfinder+nosimd
        run: cargo build --target wasm32-unknown-unknown --release --no-default-features --features pathfinder
        env:
          RUSTFLAGS: ""

      - name: Bindgen pathfinder+nosimd
        run: |
          wasm-bindgen --target web --out-dir dist/pathfinder-nosimd --no-typescript \
            target/wasm32-unknown-unknown/release/vello_bench2.wasm

      - name: Copy index.html
        run: cp web/index.html dist/index.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
