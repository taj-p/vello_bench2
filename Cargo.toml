[package]
name = "vello_bench2"
version = "0.1.0"
edition = "2024"

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
console_error_panic_hook = "0.1.7"
console_log = "1.0.0"
log = "0.4.29"
serde = { version = "1.0.228", features = ["derive"] }
serde_json = { version = "1.0.149" }
smallvec = {version = "1.15.1" }
skrifa = { version = "0.40.0" }
usvg = { version = "0.45.1" }
vello_common = { git = "https://github.com/linebender/vello", rev = "dc82adc4" }
vello_hybrid = { git = "https://github.com/linebender/vello", rev = "dc82adc4", features = ["webgl", "text"] }
wasm-bindgen = "0.2.106"
wasm-bindgen-futures = "0.4.56"
web-sys = { version = "0.3.83", features = [
    "Window",
    "Document",
    "Element",
    "HtmlElement",
    "HtmlCanvasElement",
    "HtmlImageElement",
    "HtmlInputElement",
    "HtmlSelectElement",
    "CssStyleDeclaration",
    "WebGl2RenderingContext",
    "Performance",
    "Storage",
    "Event",
    "InputEvent",
    "KeyboardEvent",
    "MouseEvent",
    "WheelEvent",
    "AddEventListenerOptions",
    "EventTarget",
    "Node",
] }

[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
cargo-run-wasm = "0.4.0"