<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>vello_bench2</title>
  <style type="text/css">
    body { margin: 0px; }
  </style>
</head>

<body>
  <script type="module">
    const renderers = ["hybrid", "cpu", "pathfinder", "canvas2d"];
    const storedRenderer = localStorage.getItem("vello_bench_renderer") || "hybrid";
    const renderer = renderers.includes(storedRenderer) ? storedRenderer : "hybrid";
    const simd = renderer === "canvas2d" ? true : localStorage.getItem("vello_bench_simd") !== "0";
    const simdStr = renderer === "canvas2d" ? "simd" : (simd ? "simd" : "nosimd");
    const mod_path = `./${renderer}-${simdStr}/vello_bench2.js`;

    window.__vello_simd = simd;
    window.__vello_renderer = renderer;
    if (renderer !== "canvas2d") {
      window.__vello_toggle_simd = () => {
        localStorage.setItem("vello_bench_simd", simd ? "0" : "1");
        location.reload();
      };
    } else {
      delete window.__vello_toggle_simd;
    }
    window.__vello_toggle_renderer = () => {
      const idx = renderers.indexOf(renderer);
      const nextRenderer = renderers[(idx + 1) % renderers.length];
      if (renderer === "canvas2d" || nextRenderer === "canvas2d") {
        localStorage.setItem("vello_bench_simd", "1");
      }
      localStorage.setItem("vello_bench_renderer", nextRenderer);
      location.reload();
    };

    const { default: init } = await import(mod_path);
    if (document.readyState === "complete") {
      init();
    } else {
      window.addEventListener("load", () => init());
    }
  </script>

</body>

</html>
