<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>vello_bench2</title>
  <style type="text/css">
    body { margin: 0px; }
  </style>
</head>

<body>
  <script type="module">
    const simd = localStorage.getItem("vello_bench_simd") !== "0";
    const renderer = localStorage.getItem("vello_bench_renderer") || "hybrid";
    const simdStr = simd ? "simd" : "nosimd";
    const mod_path = `./${renderer}-${simdStr}/vello_bench2.js`;

    window.__vello_simd = simd;
    window.__vello_renderer = renderer;
    window.__vello_toggle_simd = () => {
      localStorage.setItem("vello_bench_simd", simd ? "0" : "1");
      location.reload();
    };
    window.__vello_toggle_renderer = () => {
      localStorage.setItem("vello_bench_renderer", renderer === "hybrid" ? "cpu" : "hybrid");
      location.reload();
    };

    const { default: init } = await import(mod_path);
    if (document.readyState === "complete") {
      init();
    } else {
      window.addEventListener("load", () => init());
    }
  </script>

</body>

</html>
